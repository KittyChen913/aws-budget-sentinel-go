name: Build and Deploy to AWS Lambda

on:
  push:
    branches:
      - master

env:
  GOOS: linux
  GOARCH: amd64
  CGO_ENABLED: 0
  FUNCTION_NAME: aws-budget-sentinel
  SSM_PARAM_PATH: /budget-sentinel/prod
  GO_VERSION: '1.24.1'
  TERRAFORM_VERSION: '1.10.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          
      - name: Build Lambda function
        run: |
          go build -ldflags="-s -w" -o bootstrap ./cmd/lambda
          
      - name: Create deployment package
        run: |
          zip lambda-deployment.zip bootstrap
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-deployment
          path: lambda-deployment.zip
          
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-deployment
          path: ./lambda-artifact
          
      - name: Configure AWS credentials via OIDC
        uses: ./.github/actions/configure-aws
        with:
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init
        
      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -out=tfplan
        
      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan
        
      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.FUNCTION_NAME }} \
            --zip-file fileb://lambda-artifact/lambda-deployment.zip

      - name: Get SSM Parameters
        uses: ./.github/actions/get-ssm-parameters
        with:
          ssm_param_path: ${{ env.SSM_PARAM_PATH }}

      - name: Update Lambda environment variables
        if: steps.get-ssm.outputs.env_vars != ''
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ env.FUNCTION_NAME }} \
            --environment "Variables={${{ steps.get-ssm.outputs.env_vars }}}"

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.FUNCTION_NAME }}
            
      - name: Deploy complete
        run: |
          echo "Lambda function ${{ env.FUNCTION_NAME }} deployed successfully!"
          aws lambda get-function \
            --function-name ${{ env.FUNCTION_NAME }} \
            --query 'Configuration.[FunctionName,CodeSha256,LastModified]' \
            --output table
            
  test:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      
    steps:
      - name: Configure AWS credentials via OIDC
        uses: ./.github/actions/configure-aws
        with:
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Test Lambda function
        run: |
          aws lambda invoke \
            --function-name ${{ env.FUNCTION_NAME }} \
            lambda_response.json > invoke_metadata.json 2>&1
          echo "Invoke metadata:"
          cat invoke_metadata.json
          echo ""
          echo "Lambda response:"
          cat lambda_response.json
          
      - name: Verify Lambda response
        run: |
          STATUS_CODE=$(jq -r '.StatusCode' invoke_metadata.json)
          CHECK_ERRORS=$(jq -r '.check_errors // empty' lambda_response.json)
          
          echo "Status Code: $STATUS_CODE"
          echo "Check Errors: $CHECK_ERRORS"
          
          if [ "$STATUS_CODE" != "200" ]; then
            echo "✗ Lambda function failed with status code: $STATUS_CODE"
            exit 1
          fi
          
          if [ -n "$CHECK_ERRORS" ] && [ "$CHECK_ERRORS" != "{}" ]; then
            echo "⚠ Lambda executed but some checks failed:"
            jq '.check_errors' lambda_response.json
            echo "Please check AWS permissions and CloudWatch logs"
            exit 1
          fi
          
          echo "✓ Lambda function executed successfully with no check errors"